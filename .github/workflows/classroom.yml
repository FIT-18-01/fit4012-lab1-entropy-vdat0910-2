name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: check-tests-and-logs
      id: check-tests-and-logs
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: check-tests-and-logs
        setup-command: ''
        command: python3 .github/scripts/check_lab01.py
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CHECK-TESTS-AND-LOGS_RESULTS: "${{steps.check-tests-and-logs.outputs.result}}"
      with:
        runners: check-tests-and-logs
